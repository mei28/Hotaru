name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create releases via the GITHUB_TOKEN

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        # The Xcode project uses objectVersion 77 / PBXFileSystemSynchronizedRootGroup
        # which requires Xcode 16+. macos-latest runners currently ship with
        # a compatible version; setup-xcode pins the newest available one.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install tools
        run: |
          brew install just xcbeautify

      - name: Build Release zip
        run: just release

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "./dist/Hotaru-${{ steps.version.outputs.version }}.zip" \
            --title "Hotaru ${GITHUB_REF_NAME}" \
            --generate-notes
